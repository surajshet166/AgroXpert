<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroXpert - Create Account</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url("{{ url_for('static', filename='images/bg-agriculture.jpg') }}") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(27, 94, 32, 0.75);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
}

body {
    opacity: 0;
    transition: opacity 0.5s ease;
}

body.loaded {
    opacity: 1;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 15px;
    width: 400px;
    color: white;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.logo {
    font-size: 40px;
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 5px;
}

.tagline {
    font-size: 14px;
    margin-bottom: 20px;
    color: #dcedc8;
}

/* Input styling */
.input-box {
    position: relative;
    margin: 12px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: white;
    color: #333;
}

.input-box i {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
    color: #555;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #1b5e20;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

button:hover {
    background: #2e7d32;
    color: white;
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Captcha Button Reset */
.captcha-btn {
    width: auto;
    background: white;
    box-shadow: none;
}

.captcha-btn:hover {
    background: white;
    transform: none;
    box-shadow: none;
}

.error {
    color: #ffcccc;
    margin-bottom: 10px;
    font-size: 0.9rem;
}

.link {
    margin-top: 15px;
}

.link a {
    color: white;
    text-decoration: underline;
}

/* Responsive Design */
@media (max-width: 768px) {
    .container {
        width: 90%;
        padding: 30px 25px;
    }
}

@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 25px 20px;
    }
    .logo { font-size: 32px; }
    h2 { font-size: 1.3rem; }
    .tagline { font-size: 12px; }
}
</style>
</head>

<body>

<div class="container">
    <a href="/" style="text-decoration: none; color: inherit;"><div class="logo">🌿</div></a>
    <a href="/" style="text-decoration: none; color: inherit;"><h2>AgroXpert Register</h2></a>
    <div class="tagline">Join our community of smart farmers</div>

    <!-- Flash Message -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="error">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

    <form action="/register" method="post">
        <div class="input-box">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
        </div>

        <div class="input-box">
            <input type="text" name="mobile" placeholder="Mobile Number (10 digits)" required pattern="[0-9]{10}">
        </div>

        <!-- Captcha -->
        <div class="input-box" style="display:flex; gap:10px;">
            <input type="text" value="{{ captcha }}" readonly
                   style="background:#e8f5e9; font-weight:bold;">
            <button type="button" onclick="refreshCaptcha()" class="captcha-btn">🔄</button>
        </div>

        <div class="input-box">
            <input type="text" name="captcha_input" placeholder="Enter Captcha">
        </div>

        <button type="submit">
            <i class="fa-solid fa-user-plus"></i> Register
        </button>
    </form>

    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function refreshCaptcha() {
    window.location.href = "/register?refresh=" + Date.now();
}

window.onload = function() {
    document.body.classList.add("loaded");
}
</script>

</body>
</html>
