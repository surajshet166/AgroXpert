<style>
    :root {
        --primary-green: #2e7d32;
        --light-green: #66bb6a;
        --dark-green: #1b5e20;
        --accent-green: #4caf50;
        --white: #ffffff;
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
    }

    .navbar {
        padding: 15px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 1000;
        width: 100%;
        box-sizing: border-box;
    }

    .navbar .logo a {
        font-size: 22px;
        font-weight: 700;
        color: var(--white);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .nav-links {
        display: flex;
        gap: 25px;
        align-items: center;
    }

    .nav-links a {
        color: var(--white);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .nav-links a:hover {
        color: var(--light-green);
    }

    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background: rgba(27, 94, 32, 0.95);
        backdrop-filter: blur(10px);
        min-width: 200px;
        box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
        z-index: 1;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        top: 100%;
        left: 0;
    }

    .dropdown-content a {
        color: white;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        font-size: 0.9rem;
    }

    .dropdown-content a:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--light-green);
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* Bridge to prevent losing hover when moving to dropdown */
    .dropdown::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 20px;
        bottom: -20px;
        left: 0;
        display: none;
    }

    .dropdown:hover::after {
        display: block;
    }

    @media (max-width: 768px) {
        .navbar { padding: 15px 20px; }
        .nav-links { gap: 15px; }
        .nav-links a span { display: none; }
    }
</style>

<div class="navbar">
    <div class="logo">
        <a href="/"><i class="fa-solid fa-seedling"></i> AgroXpert</a>
    </div>
    <div class="nav-links">
        <a href="/dashboard"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a>
        <div class="dropdown">
            <a href="#"><i class="fa-solid fa-gears"></i> <span>Services <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i></span></a>
            <div class="dropdown-content">
                <a href="/soil_safety"><i class="fa-solid fa-vial"></i> Soil Safety Check</a>
                <a href="/predict"><i class="fa-solid fa-leaf"></i> Crop Prediction</a>
                <a href="/disease"><i class="fa-solid fa-bug"></i> Disease Detection</a>
            </div>
        </div>
        <a href="/history"><i class="fa-solid fa-clock-rotate-left"></i> <span>History</span></a>
        <a href="/profile"><i class="fa-solid fa-user"></i> <span>Profile</span></a>
        <a href="/logout" style="color: #ff8a80;"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a>
    </div>
</div>
