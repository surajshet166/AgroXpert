<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgroXpert Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url("{{ url_for('static', filename='images/bg-agriculture.jpg') }}") no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(27, 94, 32, 0.75);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
}
body {
    opacity: 0;
    transition: opacity 0.5s ease;
}

body.loaded {
    opacity: 1;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 15px;
    width: 400px;
    color: white;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.logo {
    font-size: 40px;
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 5px;
}

.tagline {
    font-size: 14px;
    margin-bottom: 20px;
    color: #dcedc8;
}



/* Input */
.input-box {
    position: relative;
    margin: 15px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.input-box i {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
    color: black;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #1b5e20;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 5px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

button:not(.captcha-btn):hover {
    background: #2e7d32;
    color: white;
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* Captcha Button Reset */
.captcha-btn {
    width: auto;
    background: white;
    box-shadow: none;
}

.captcha-btn:hover {
    background: white;
    transform: none;
    box-shadow: none;
}

/* Sections */
.login-section {
    display: none;
    animation: fade 0.4s ease;
}

.active-section {
    display: block;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

.error {
    color: #ffcccc;
    margin-bottom: 10px;
}

.link {
    margin-top: 15px;
}

.link a {
    color: white;
    text-decoration: underline;
}

/* Responsive Design */
@media (max-width: 768px) {
    .container {
        width: 90%;
        padding: 30px 25px;
    }
}

@media (max-width: 480px) {
    .container {
        width: 95%;
        padding: 25px 20px;
    }
    .logo { font-size: 32px; }
    h2 { font-size: 1.3rem; }
    .tagline { font-size: 12px; }
}
</style>
</head>

<body>

<div class="container">
    <a href="/" style="text-decoration: none; color: inherit;"><div class="logo">🌿</div></a>
    <a href="/" style="text-decoration: none; color: inherit;"><h2>AgroXpert Login</h2></a>
    <div class="tagline">Predict, Analyze, Grow Better</div>

    <!-- Flash Message -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="error">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

  
    <!-- 🔐 PASSWORD LOGIN -->
    <div id="password-login" class="login-section active-section">
        <form method="POST" action="/login">

            <div class="input-box">
                <input type="text" name="username" placeholder="Username">
            </div>

            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="Password">
                <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
            </div>

            <!-- Captcha -->
            <div class="input-box" style="display:flex; gap:10px;">
                <input type="text" value="{{ captcha }}" readonly
                       style="background:#e8f5e9; font-weight:bold;">
                <button type="button" onclick="refreshCaptcha()" class="captcha-btn">🔄</button>
            </div>

            <div class="input-box">
                <input type="text" name="captcha_input" placeholder="Enter Captcha">
            </div>

            <button name="action" value="password_login">Login</button>
        </form>
    </div>

 

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>
    <div class="link">
    <a href="/forgot">Forgot Password?</a>
</div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function refreshCaptcha() {
    window.location.href = "/login?refresh=" + Date.now();
}
</script>
<script>
window.onload = function() {
    document.body.classList.add("loaded");
}
</script>
</body>
</html>
